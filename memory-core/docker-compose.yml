version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memoryos
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: memoryos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  memory-core:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: memoryos
      DB_PASSWORD: changeme
      DB_NAME: memoryos
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SQLITE_PATH: /data/sessions.db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - memorydata:/data

volumes:
  pgdata:
  redisdata:
  memorydata:
