<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>Memory Core · Admin</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2128;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d2991d;
    --purple: #a371f7;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); }

  /* Header */
  header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    margin-right: 32px;
    white-space: nowrap;
  }
  header nav { display: flex; gap: 4px; overflow-x: auto; flex: 1; }
  header nav button {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 6px;
    white-space: nowrap;
    transition: all .15s;
  }
  header nav button:hover { color: var(--text); background: var(--bg-hover); }
  header nav button.active { color: var(--text); background: var(--bg-hover); font-weight: 600; }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .page { display: none; }
  .page.active { display: block; }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .card-header {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text);
  }

  /* Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }

  /* Tables */
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--text-muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
  tr:hover td { background: var(--bg-hover); }

  /* Tags / Badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-green { background: rgba(63,185,80,.15); color: var(--green); }
  .badge-red { background: rgba(248,81,73,.15); color: var(--red); }
  .badge-orange { background: rgba(210,153,29,.15); color: var(--orange); }
  .badge-purple { background: rgba(163,113,247,.15); color: var(--purple); }
  .badge-accent { background: rgba(88,166,255,.15); color: var(--accent); }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    transition: all .15s;
  }
  .btn:hover { background: var(--bg-hover); border-color: #484f58; }
  .btn-primary { background: #238636; border-color: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-danger { background: #da3633; border-color: #da3633; color: #fff; }
  .btn-danger:hover { background: #f85149; }
  .btn-sm { padding: 3px 10px; font-size: 12px; }

  /* Search */
  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-box input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 14px;
  }
  .search-box input:focus { outline: none; border-color: var(--accent); }
  .search-box select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 14px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 700px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .modal h3 { font-size: 18px; margin-bottom: 16px; color: var(--accent); }
  .modal .field { margin-bottom: 12px; }
  .modal .field-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
  .modal .field-value { font-size: 14px; color: var(--text); word-break: break-word; }
  .modal .close-btn {
    float: right;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
  }
  .modal .close-btn:hover { color: var(--text); }

  /* Plugin Cards */
  .plugin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .plugin-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .plugin-name { font-size: 16px; font-weight: 600; }
  .plugin-status { font-size: 13px; }
  .plugin-actions { display: flex; gap: 8px; margin-top: auto; }

  /* Settings */
  .settings-section { margin-bottom: 24px; }
  .settings-section h3 { font-size: 15px; color: var(--accent); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
  .settings-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .settings-item:last-child { border-bottom: none; }
  .settings-key { font-size: 12px; color: var(--text-muted); }
  .settings-val { font-size: 14px; color: var(--text); word-break: break-all; }

  /* Ingest form */
  .ingest-panel { margin-top: 24px; }
  .ingest-panel textarea {
    width: 100%;
    min-height: 100px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    color: var(--text);
    font-size: 14px;
    resize: vertical;
    font-family: inherit;
  }
  .ingest-panel textarea:focus { outline: none; border-color: var(--accent); }
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .form-row input {
    flex: 1;
    min-width: 160px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 14px;
  }
  .form-row input:focus { outline: none; border-color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 14px;
    z-index: 300;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
    animation: slideUp .3s ease;
  }
  .toast-success { border-color: var(--green); color: var(--green); }
  .toast-error { border-color: var(--red); color: var(--red); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* Empty */
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    header { padding: 0 12px; }
    header nav button { padding: 8px 10px; font-size: 12px; }
    .container { padding: 12px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🧠 Memory Core</div>
  <nav>
    <button class="active" data-page="dashboard">Dashboard</button>
    <button data-page="memories">Memories</button>
    <button data-page="plugins">Plugins</button>
    <button data-page="settings">Settings</button>
  </nav>
</header>

<div class="container">

  <!-- ===== Dashboard Page ===== -->
  <div id="page-dashboard" class="page active">
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Memories</div><div class="stat-value" id="stat-total">-</div></div>
      <div class="stat-card"><div class="stat-label">Episodes</div><div class="stat-value" id="stat-episodes">-</div></div>
      <div class="stat-card"><div class="stat-label">Facts</div><div class="stat-value" id="stat-facts">-</div></div>
      <div class="stat-card"><div class="stat-label">Entities</div><div class="stat-value" id="stat-entities">-</div></div>
    </div>
    <div class="card">
      <div class="card-header">Recent Memories</div>
      <div id="recent-memories"><div class="loading"><span class="spinner"></span>Loading...</div></div>
    </div>
    <div class="card ingest-panel">
      <div class="card-header">Manual Ingest</div>
      <div class="form-row">
        <input type="text" id="ingest-user" placeholder="User ID" />
        <input type="text" id="ingest-source" placeholder="Source (default: dashboard)" />
      </div>
      <textarea id="ingest-text" placeholder="Enter text to ingest as a new memory..."></textarea>
      <button class="btn btn-primary" onclick="doIngest()" style="margin-top:10px;">Ingest Memory</button>
    </div>
  </div>

  <!-- ===== Memories Page ===== -->
  <div id="page-memories" class="page">
    <div class="search-box">
      <input type="text" id="mem-search" placeholder="Search memories..." onkeydown="if(event.key==='Enter') loadMemories()" />
      <select id="mem-level">
        <option value="">All Levels</option>
        <option value="raw_event">Raw Event</option>
        <option value="episode">Episode</option>
        <option value="fact">Fact</option>
        <option value="preference">Preference</option>
        <option value="personality">Personality</option>
        <option value="knowledge">Knowledge</option>
        <option value="archive">Archive</option>
      </select>
      <input type="text" id="mem-user" placeholder="User ID" style="max-width:160px;" />
      <button class="btn btn-primary" onclick="loadMemories()">Search</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>ID</th><th>Content</th><th>Level</th><th>Importance</th><th>Created</th></tr></thead>
        <tbody id="memories-table"><tr><td colspan="5" class="loading"><span class="spinner"></span>Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ===== Plugins Page ===== -->
  <div id="page-plugins" class="page">
    <div class="plugin-grid" id="plugin-grid">
      <div class="loading"><span class="spinner"></span>Loading plugins...</div>
    </div>
  </div>

  <!-- ===== Settings Page ===== -->
  <div id="page-settings" class="page">
    <div id="settings-content"><div class="loading"><span class="spinner"></span>Loading config...</div></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ---------- State ----------
const API = '/admin/api';
let currentPage = 'dashboard';

// ---------- Navigation ----------
document.querySelectorAll('header nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('header nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPage = btn.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + currentPage).classList.add('active');
    if (currentPage === 'dashboard') { loadStats(); loadRecentMemories(); }
    if (currentPage === 'memories')  loadMemories();
    if (currentPage === 'plugins')   loadPlugins();
    if (currentPage === 'settings')  loadConfig();
  });
});

// ---------- Modal ----------
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

// ---------- Toast ----------
function toast(msg, type) {
  type = type || 'success';
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ---------- API Fetch ----------
async function apiFetch(path, opts) {
  opts = opts || {};
  const url = API + path;
  const headers = opts.headers || {};
  const res = await fetch(url, { ...opts, headers });
  if (res.status === 401) { toast('Authentication required. Please check credentials.', 'error'); throw new Error('Unauthorized'); }
  return res;
}

// ===== Dashboard =====
async function loadStats() {
  try {
    const res = await apiFetch('/stats');
    const data = await res.json();
    document.getElementById('stat-total').textContent = data.total_memories || 0;
    document.getElementById('stat-episodes').textContent = (data.by_level && data.by_level.episode) || 0;
    document.getElementById('stat-facts').textContent = (data.by_level && data.by_level.fact) || 0;
    document.getElementById('stat-entities').textContent = data.total_entities || 0;
  } catch(e) { /* silent */ }
}

async function loadRecentMemories() {
  const container = document.getElementById('recent-memories');
  try {
    const res = await apiFetch('/memories?limit=5');
    const data = await res.json();
    const memories = data.memories || [];
    if (memories.length === 0) {
      container.innerHTML = '<div class="empty">No memories yet</div>';
      return;
    }
    container.innerHTML = `<table>
      <thead><tr><th>ID</th><th>Content</th><th>Level</th><th>Created</th></tr></thead>
      <tbody>${memories.map(m => `<tr>
        <td style="font-family:monospace;font-size:12px;">${esc(m.id).substring(0,12)}...</td>
        <td>${esc((m.content||'').substring(0,80))}${(m.content||'').length>80?'...':''}</td>
        <td><span class="badge badge-accent">${esc(m.level)}</span></td>
        <td style="font-size:12px;color:var(--text-muted);">${fmtDate(m.created_at)}</td>
      </tr>`).join('')}</tbody></table>`;
  } catch(e) {
    container.innerHTML = '<div class="empty">Unable to load memories</div>';
  }
}

async function doIngest() {
  const userId = document.getElementById('ingest-user').value.trim();
  const source = document.getElementById('ingest-source').value.trim();
  const text = document.getElementById('ingest-text').value.trim();
  if (!userId || !text) { toast('User ID and text are required', 'error'); return; }
  try {
    const res = await apiFetch('/ingest', {
      method: 'POST',
      body: JSON.stringify({ user_id: userId, source: source || 'dashboard', text }),
      headers: { 'Content-Type': 'application/json' }
    });
    const data = await res.json();
    if (res.ok) {
      toast('Memory ingested: ' + data.event_id);
      document.getElementById('ingest-text').value = '';
      loadStats();
      loadRecentMemories();
    } else {
      toast(data.error || 'Ingest failed', 'error');
    }
  } catch(e) { toast('Ingest failed: ' + e.message, 'error'); }
}

// ===== Memories =====
async function loadMemories() {
  const search = document.getElementById('mem-search').value.trim();
  const level = document.getElementById('mem-level').value;
  const user = document.getElementById('mem-user').value.trim();
  const params = new URLSearchParams({ limit: '50', offset: '0' });
  if (search) params.set('search', search);
  if (level) params.set('level', level);
  if (user) params.set('user_id', user);
  const tbody = document.getElementById('memories-table');
  tbody.innerHTML = '<tr><td colspan="5"><div class="loading"><span class="spinner"></span>Loading...</div></td></tr>';
  try {
    const res = await apiFetch('/memories?' + params.toString());
    const data = await res.json();
    const memories = data.memories || [];
    if (memories.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty">No memories found</div></td></tr>';
      return;
    }
    tbody.innerHTML = memories.map(m => `<tr style="cursor:pointer" onclick="showMemoryDetail('${esc(m.id)}', ${JSON.stringify(esc(JSON.stringify(m))).replace(/"/g, '&quot;')})">
      <td style="font-family:monospace;font-size:12px;">${esc(m.id).substring(0,12)}...</td>
      <td>${esc((m.content||'').substring(0,100))}${(m.content||'').length>100?'...':''}</td>
      <td><span class="badge badge-accent">${esc(m.level)}</span></td>
      <td>${(m.importance||0).toFixed(2)}</td>
      <td style="font-size:12px;color:var(--text-muted);">${fmtDate(m.created_at)}</td>
    </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty">Failed to load</div></td></tr>';
  }
}

function showMemoryDetail(id, raw) {
  let m;
  try { m = JSON.parse(raw); } catch(e) { return; }
  const html = `
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h3>Memory Detail</h3>
    <div class="field"><div class="field-label">ID</div><div class="field-value" style="font-family:monospace">${esc(m.id)}</div></div>
    <div class="field"><div class="field-label">User ID</div><div class="field-value">${esc(m.user_id||'')}</div></div>
    <div class="field"><div class="field-label">Level</div><div class="field-value"><span class="badge badge-accent">${esc(m.level)}</span></div></div>
    <div class="field"><div class="field-label">Content</div><div class="field-value">${esc(m.content||'')}</div></div>
    <div class="field"><div class="field-label">Importance</div><div class="field-value">${(m.importance||0).toFixed(3)}</div></div>
    <div class="field"><div class="field-label">Decay Factor</div><div class="field-value">${(m.decay_factor||0).toFixed(3)}</div></div>
    <div class="field"><div class="field-label">Access Count</div><div class="field-value">${m.access_count||0}</div></div>
    <div class="field"><div class="field-label">Source</div><div class="field-value">${esc((m.metadata&&m.metadata.source)||'')}</div></div>
    <div class="field"><div class="field-label">Tags</div><div class="field-value">${(m.metadata&&m.metadata.tags||[]).map(t => `<span class="badge badge-purple">${esc(t)}</span>`).join(' ') || '—'}</div></div>
    <div class="field"><div class="field-label">Entities</div><div class="field-value">${(m.entities||[]).map(e => `${esc(e.name)} <span class="badge badge-accent">${esc(e.type)}</span>`).join(', ') || '—'}</div></div>
    <div class="field"><div class="field-label">Created</div><div class="field-value">${fmtDate(m.created_at)}</div></div>
    <div class="field"><div class="field-label">Updated</div><div class="field-value">${fmtDate(m.updated_at)}</div</th></th>></div>
    <div</th> class="field"><div class</th></th>="field-label">Last Accessed</div><div class="field-value">${fmtDate(m.last_accessed_at)}</div></div>
  `;
  openModal(html);
}

// ===== Plugins =====
async function loadPlugins() {
  const grid = document.getElementById('plugin-grid');
  try {
    const res = await apiFetch('/plugins');
    const data = await res.json();
    const plugins = data.plugins || [];
    if (plugins.length === 0) {
      grid.innerHTML = '<div class="empty">No plugins registered</div>';
      return;
    }
    grid.innerHTML = plugins.map(p => {
      let statusHtml = '';
      if (p.healthy && p.running) statusHtml = '<span class="badge badge-green">Healthy</span>';
      else if (p.running) statusHtml = '<span class="badge badge-orange">Running (Unhealthy)</span>';
      else statusHtml = '<span class="badge badge-red">Stopped</span>';
      let errorHtml = p.error ? `<div style="font-size:12px;color:var(--red);margin-top:4px;">${esc(p.error)}</div>` : '';
      return `<div class="plugin-card">
        <div class="plugin-name">${esc(p.name)}</div>
        <div class="plugin-status">${statusHtml}${errorHtml}</div>
        <div class="plugin-actions">
          <button class="btn btn-primary btn-sm" onclick="pluginAction('${esc(p.name)}','start')">▶ Start</button>
          <button class="btn btn-danger btn-sm" onclick="pluginAction('${esc(p.name)}','stop')">⏹ Stop</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    grid.innerHTML = '<div class="empty">Failed to load plugins</div>';
  }
}

async function pluginAction(name, action) {
  try {
    const res = await apiFetch('/plugins/' + encodeURIComponent(name) + '/' + action, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      toast(`Plugin ${name}: ${action}ed`);
      loadPlugins();
    } else {
      toast(data.error || 'Action failed', 'error');
    }
  } catch(e) { toast('Action failed: ' + e.message, 'error'); }
}

// ===== Settings =====
async function loadConfig() {
  const container = document.getElementById('settings-content');
  try {
    const res = await apiFetch('/config');
    const data = await res.json();
    let html = '';
    for (const [section, items] of Object.entries(data)) {
      html += `<div class="settings-section"><h3>${esc(section)}</h3><div class="settings-grid">`;
      for (const [key, val] of Object.entries(items)) {
        const displayVal = val === null || val === undefined ? '—' : typeof val === 'object' ? JSON.stringify(val) : String(val);
        html += `<div class="settings-item"><div class="settings-key">${esc(key)}</div><div class="settings-val">${esc(displayVal)}</div></div>`;
      }
      html += '</div></div>';
    }
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div class="empty">Failed to load config</div>';
  }
}

// ===== Helpers =====
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { if (!d) return '—'; try { return new Date(d).toLocaleString(); } catch(e) { return d; } }

// ===== Init =====
loadStats();
loadRecentMemories();
</script>
